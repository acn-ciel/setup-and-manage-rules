# yaml-language-server: $schema=https://sap.github.io/ui5-tooling/schema/ui5.yaml.json

specVersion: "4.0"
metadata:
  name: applyrules
type: application
server:
  customMiddleware:
    - name: fiori-tools-proxy
      afterMiddleware: compression
      configuration:
        ignoreCertErrors: false # If set to true, certificate errors will be ignored. E.g. self-signed certificates will be accepted
        ui5:
          path:
            - /resources
            - /test-resources
          url: https://ui5.sap.com
        backend:
          - path: /sap/opu/odata4/sap/zsb_rules/srvd/sap/zsd_rules/0001/
            url: https://3ded81b5-3f07-48a6-92ef-d6cfc17edd60.abap.eu10.hana.ondemand.com
            destination: ZSAP_BAS
          - path: /sap/opu/odata4/sap/zui_calcres_v4/srvd/sap/zui_calcres_o4/0001/
            url: https://3ded81b5-3f07-48a6-92ef-d6cfc17edd60.abap.eu10.hana.ondemand.com
            destination: ZSAP_BAS
          - path: /sap/opu/odata4/sap/zapi_plant_v4/srvd_a2x/sap/zsd_plant_vh/0001/
            url: https://3ded81b5-3f07-48a6-92ef-d6cfc17edd60.abap.eu10.hana.ondemand.com
            destination: ZSAP_BAS
          - path: /sap/opu/odata4/sap/zapi_itemtype_v4/srvd_a2x/sap/zsd_itemtype_vh/0001/
            url: https://3ded81b5-3f07-48a6-92ef-d6cfc17edd60.abap.eu10.hana.ondemand.com
            destination: ZSAP_BAS
          - path: /sap/opu/odata4/sap/zapi_typerules_v4/srvd_a2x/sap/zsd_typerules_vh/0001/
            url: https://3ded81b5-3f07-48a6-92ef-d6cfc17edd60.abap.eu10.hana.ondemand.com
            destination: ZSAP_BAS
          - path: /sap/opu/odata4/sap/zui_ruleslist_v4/srvd/sap/zsd_ruleslist/0001/
            url: https://3ded81b5-3f07-48a6-92ef-d6cfc17edd60.abap.eu10.hana.ondemand.com
            destination: ZSAP_BAS
    - name: fiori-tools-appreload
      afterMiddleware: compression
      configuration:
        port: 35729
        path: webapp
        delay: 300
    - name: fiori-tools-preview
      afterMiddleware: fiori-tools-appreload
      configuration:
        flp:
          theme: sap_horizon
    - name: sap-fe-mockserver
      beforeMiddleware: csp
      configuration:
        mountPath: /
        services:
          - urlPath: /sap/opu/odata4/sap/zsb_rules/srvd/sap/zsd_rules/0001
            metadataPath: ./webapp/localService/mainService/metadata.xml
            mockdataPath: ./webapp/localService/mainService/data
            generateMockData: true
          - urlPath: /sap/opu/odata4/sap/zui_calcres_v4/srvd/sap/zui_calcres_o4/0001
            metadataPath: ./webapp/localService/zui_calcres_o4/metadata.xml
            mockdataPath: ./webapp/localService/zui_calcres_o4/data
            generateMockData: true
          - urlPath: /sap/opu/odata4/sap/zapi_plant_v4/srvd_a2x/sap/zsd_plant_vh/0001
            metadataPath: ./webapp/localService/zsd_plant_vh/metadata.xml
            mockdataPath: ./webapp/localService/zsd_plant_vh/data
            generateMockData: true
          - urlPath: /sap/opu/odata4/sap/zapi_itemtype_v4/srvd_a2x/sap/zsd_itemtype_vh/0001
            metadataPath: ./webapp/localService/zsd_itemtype_vh/metadata.xml
            mockdataPath: ./webapp/localService/zsd_itemtype_vh/data
            generateMockData: true
          - urlPath: /sap/opu/odata4/sap/zapi_typerules_v4/srvd_a2x/sap/zsd_typerules_vh/0001
            metadataPath: ./webapp/localService/zsd_typerules_vh/metadata.xml
            mockdataPath: ./webapp/localService/zsd_typerules_vh/data
            generateMockData: true
          - urlPath: /sap/opu/odata4/sap/zui_ruleslist_v4/srvd/sap/zsd_ruleslist/0001
            metadataPath: ./webapp/localService/zsd_ruleslist/metadata.xml
            mockdataPath: ./webapp/localService/zsd_ruleslist/data
            generateMockData: true
        annotations: []
